# fly.toml app configuration file generated for gist-backend on 2026-03-22T01:43:19-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gist-backend'
primary_region = 'bom'

[build]

[deploy]
  release_command = "python run_migration_fly.py"

[env]
  APP_ENV = 'production'
  DB_USE_PGBOUNCER = 'true'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
